# Build and Release lux-accel (shared library for FFI/CGO)
name: Build

on:
  push:
    branches: [main, release/*]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CMAKE_BUILD_TYPE: Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            arch: x86_64
            artifact: linux-x86_64
          - os: ubuntu-24.04
            arch: arm64
            artifact: linux-arm64
            cross: true
          - os: macos-14
            arch: arm64
            artifact: macos-arm64
          - os: windows-2022
            arch: x86_64
            artifact: windows-x86_64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Checkout lux-gpu
        uses: actions/checkout@v4
        with:
          repository: luxcpp/lux-gpu
          path: deps/lux-gpu

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      - name: Install cross-compiler (Linux ARM64)
        if: matrix.cross && runner.os == 'Linux'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja

      # ---- Build lux-gpu dependency ----

      - name: Build lux-gpu (Unix native)
        if: runner.os != 'Windows' && !matrix.cross
        run: |
          cmake -B deps/lux-gpu/build -S deps/lux-gpu \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install
          cmake --build deps/lux-gpu/build --config Release
          cmake --install deps/lux-gpu/build --config Release

      - name: Build lux-gpu (Linux ARM64 cross)
        if: matrix.cross && runner.os == 'Linux'
        run: |
          cmake -B deps/lux-gpu/build -S deps/lux-gpu \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install
          cmake --build deps/lux-gpu/build --config Release
          cmake --install deps/lux-gpu/build --config Release

      - name: Build lux-gpu (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B deps/lux-gpu/build -S deps/lux-gpu `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}\install"
          cmake --build deps/lux-gpu/build --config Release
          cmake --install deps/lux-gpu/build --config Release --verbose

      # ---- Configure lux-accel ----

      - name: Configure (Unix native)
        if: runner.os != 'Windows' && !matrix.cross
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=${{ github.workspace }}/install

      - name: Configure (Linux ARM64 cross)
        if: matrix.cross && runner.os == 'Linux'
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_PREFIX_PATH=${{ github.workspace }}/install

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: |
          # List installed cmake config for debugging
          Get-ChildItem -Path "${{ github.workspace }}\install" -Recurse -Filter "*.cmake" | ForEach-Object { Write-Host $_.FullName }
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}\install"

      # ---- Build & Package ----

      - name: Build
        run: cmake --build build --config Release

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist/lib dist/include
          cp build/liblux_accel* dist/lib/ 2>/dev/null || true
          cp build/libluxaccel* dist/lib/ 2>/dev/null || true
          cp -r include/* dist/include/
          tar -czvf lux-accel-${{ matrix.artifact }}.tar.gz -C dist .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist/lib dist/include
          cp build/Release/luxaccel* dist/lib/ 2>/dev/null || true
          cp build/Release/lux_accel* dist/lib/ 2>/dev/null || true
          cp -r include/* dist/include/
          tar -czvf lux-accel-${{ matrix.artifact }}.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: lux-accel-${{ matrix.artifact }}
          path: lux-accel-${{ matrix.artifact }}.tar.gz

  release:
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release
        run: |
          mkdir release
          find artifacts -name "*.tar.gz" -exec cp {} release/ \;
          cd release && sha256sum * > SHA256SUMS

      - name: Generate release notes
        run: |
          cat > RELEASE_NOTES.md << 'EOF'
          # lux-accel ${{ github.ref_name }}

          Shared library for Go/FFI consumers with GPU acceleration.

          ## Downloads

          | Platform | Architecture | File |
          |----------|--------------|------|
          | Linux | x86_64 | `lux-accel-linux-x86_64.tar.gz` |
          | Linux | arm64 | `lux-accel-linux-arm64.tar.gz` |
          | macOS | arm64 | `lux-accel-macos-arm64.tar.gz` |
          | Windows | x86_64 | `lux-accel-windows-x86_64.tar.gz` |

          ## Features

          - C ABI for FFI/CGO binding
          - GPU backend plugin support (Metal, CUDA, WebGPU)
          - Tensor operations, ML inference, crypto, ZK
          EOF

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
