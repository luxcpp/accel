# Build and Release lux-accel (shared library for FFI/CGO)
name: Build

on:
  push:
    branches: [main, release/*]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CMAKE_BUILD_TYPE: Release

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            arch: x86_64
            artifact: linux-x86_64
          - os: macos-14
            arch: arm64
            artifact: macos-arm64
          - os: macos-13
            arch: x86_64
            artifact: macos-x86_64
          - os: windows-2022
            arch: x86_64
            artifact: windows-x86_64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Checkout lux-gpu
        uses: actions/checkout@v4
        with:
          repository: luxcpp/lux-gpu
          path: deps/lux-gpu

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake ninja

      - name: Build lux-gpu dependency
        run: |
          cmake -B deps/lux-gpu/build -S deps/lux-gpu -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install
          cmake --build deps/lux-gpu/build --config Release
          cmake --install deps/lux-gpu/build --config Release
        shell: bash

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=${{ github.workspace }}/install

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=${{ github.workspace }}/install

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: |
          mkdir -p dist/lib dist/include
          cp build/liblux_accel* dist/lib/ 2>/dev/null || cp build/Release/lux_accel* dist/lib/ 2>/dev/null || true
          cp -r include/* dist/include/
          tar -czvf lux-accel-${{ matrix.artifact }}.tar.gz -C dist .
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: lux-accel-${{ matrix.artifact }}
          path: lux-accel-${{ matrix.artifact }}.tar.gz

  release:
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release
        run: |
          mkdir release
          find artifacts -name "*.tar.gz" -exec cp {} release/ \;
          cd release && sha256sum * > SHA256SUMS

      - name: Generate release notes
        run: |
          cat > RELEASE_NOTES.md << 'EOF'
          # lux-accel ${{ github.ref_name }}

          Shared library for Go/FFI consumers with GPU acceleration.

          ## Downloads

          | Platform | Architecture | File |
          |----------|--------------|------|
          | Linux | x86_64 | `lux-accel-linux-x86_64.tar.gz` |
          | macOS | arm64 | `lux-accel-macos-arm64.tar.gz` |
          | macOS | x86_64 | `lux-accel-macos-x86_64.tar.gz` |
          | Windows | x86_64 | `lux-accel-windows-x86_64.tar.gz` |

          ## Features

          - C ABI for FFI/CGO binding
          - GPU backend plugin support (Metal, CUDA, WebGPU)
          - Tensor operations, ML inference, crypto, ZK
          EOF

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          body_path: RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
